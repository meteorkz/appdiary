<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>AppDiary</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
<style>
:root { --bg:#f0f0f0; --dot:#ccc; --card:#fff; --text:#222; --sub:#aaa; --entry:#1a1a1a; --input-bg:#555; --border:#ddd; --fs:15px; }
body.dark { --bg:#111; --dot:#2a2a2a; --card:#1e1e1e; --text:#e8e8e8; --sub:#666; --entry:#0d0d0d; --input-bg:#333; --border:#333; }
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Sarabun',sans-serif;background:var(--bg);background-image:radial-gradient(var(--dot) 1px,transparent 1px);background-size:18px 18px;color:var(--text);-webkit-font-smoothing:antialiased;transition:background .3s,color .3s;}

/* Lock */
#lock-screen{position:fixed;inset:0;background:#111;display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:999;}
#lock-screen .lk-icon{font-size:52px;} #lock-screen .lk-title{color:#fff;font-size:22px;font-weight:600;}
#pin-input{width:200px;padding:14px;border-radius:12px;border:none;background:#222;color:#fff;font-size:24px;text-align:center;outline:none;letter-spacing:8px;}
#pin-error{color:#e55;font-size:13px;min-height:18px;}
#unlock-btn{padding:14px 40px;border-radius:999px;border:none;background:#2dca5a;color:#fff;font-size:17px;font-family:inherit;font-weight:600;cursor:pointer;}

/* App */
#loading{display:flex;align-items:center;justify-content:center;height:100vh;font-size:16px;color:#888;}
#app{display:flex;flex-direction:column;min-height:100vh;max-width:430px;margin:0 auto;padding:20px 16px 32px;gap:14px;}

/* Top row */
#top-row{display:flex;align-items:center;justify-content:space-between;}
.icon-btn{background:none;border:none;font-size:20px;cursor:pointer;padding:4px;color:var(--sub);}
#datetime{flex:1;text-align:center;color:var(--text);line-height:1.4;}
.dt-date{font-size:16px;font-weight:600;}
.dt-time{font-size:24px;font-weight:600;letter-spacing:2px;}

/* Streak */
#streak-bar{display:flex;gap:10px;justify-content:center;align-items:center;}
.stat-chip{background:var(--card);border-radius:20px;padding:6px 14px;font-size:13px;box-shadow:0 1px 3px rgba(0,0,0,.08);}

/* Search */
#search-bar{width:100%;padding:13px 20px;border-radius:999px;border:none;background:var(--input-bg);color:#fff;font-size:16px;font-family:inherit;outline:none;text-align:center;}
#search-bar::placeholder{color:#aaa;}

/* Filters */
#filter-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.mf-btn{padding:6px 12px;border-radius:999px;border:2px solid var(--border);background:var(--card);color:var(--text);font-size:14px;cursor:pointer;transition:all .15s;font-family:inherit;}
.mf-btn.active{border-color:#333;background:#333;color:#fff;}
body.dark .mf-btn.active{border-color:#fff;background:#fff;color:#111;}
.tool-btn{padding:6px 10px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;cursor:pointer;font-family:inherit;}

/* Tag chips row */
#tag-filter-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;}
#tag-filter-row::-webkit-scrollbar{display:none;}
.tag-chip{padding:4px 12px;border-radius:999px;border:2px solid var(--border);background:var(--card);color:var(--text);font-size:13px;cursor:pointer;white-space:nowrap;font-family:inherit;}
.tag-chip.active{border-color:#6c5ce7;background:#6c5ce7;color:#fff;}

/* On this day */
#on-this-day{background:linear-gradient(135deg,#6c5ce7,#a29bfe);border-radius:16px;padding:14px 16px;color:#fff;}
#on-this-day .otd-label{font-size:12px;opacity:.8;margin-bottom:4px;}
#on-this-day .otd-content{font-size:14px;line-height:1.5;}

/* Feed */
#feed{display:flex;flex-direction:column;gap:12px;}
.post-card{background:var(--card);border-radius:16px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.post-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.post-date{font-size:12px;color:var(--sub);}
.post-mood{font-size:18px;}
.post-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px;}
.post-tag{font-size:11px;padding:2px 8px;border-radius:999px;background:#6c5ce7;color:#fff;}
.post-content{font-size:var(--fs);line-height:1.6;white-space:pre-wrap;word-break:break-word;color:var(--text);}
.post-images{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.post-images img{width:calc(50% - 3px);border-radius:10px;object-fit:cover;aspect-ratio:4/3;cursor:pointer;}
.post-actions{margin-top:10px;display:flex;justify-content:flex-end;gap:6px;}
.edit-btn{background:none;border:none;color:#4a90d9;font-size:13px;cursor:pointer;padding:4px 8px;}
.del-btn{background:none;border:none;color:#e55;font-size:13px;cursor:pointer;padding:4px 8px;}
.share-btn{background:none;border:none;color:#2dca5a;font-size:13px;cursor:pointer;padding:4px 8px;}

/* Entry box */
#entry-box{background:var(--entry);border-radius:24px;padding:20px;display:flex;flex-direction:column;gap:12px;}
#entry-input{flex:1;background:transparent;border:none;color:#fff;font-size:17px;font-family:inherit;line-height:1.7;resize:none;outline:none;min-height:160px;width:100%;}
#entry-input::placeholder{color:#555;}
#word-count{font-size:12px;color:#666;text-align:right;}
#tags-input{background:rgba(255,255,255,.08);border:none;border-radius:10px;padding:8px 12px;color:#ccc;font-size:14px;font-family:inherit;outline:none;width:100%;}
#tags-input::placeholder{color:#555;}
.entry-toolbar{display:flex;align-items:center;justify-content:space-between;}
#mood-row{display:flex;gap:6px;}
.mood-btn{font-size:22px;background:none;border:2px solid transparent;border-radius:10px;padding:3px 7px;cursor:pointer;transition:border-color .15s;}
.mood-btn.selected{border-color:#fff;background:rgba(255,255,255,.1);}
#img-btn{background:none;border:none;font-size:20px;cursor:pointer;color:#888;padding:4px;}
#img-preview{display:flex;flex-wrap:wrap;gap:6px;}
#img-preview img{width:68px;height:68px;object-fit:cover;border-radius:10px;}
#draft-hint{font-size:12px;color:#555;text-align:right;}

/* Buttons */
#save-btn{width:100%;padding:18px;border-radius:999px;border:none;background:#2dca5a;color:#fff;font-size:18px;font-family:inherit;font-weight:600;cursor:pointer;transition:opacity .2s;}
#save-btn:disabled{background:#aaa;cursor:default;}
#cancel-edit-btn{width:100%;padding:12px;border-radius:999px;border:2px solid var(--border);background:transparent;color:var(--sub);font-size:15px;font-family:inherit;cursor:pointer;display:none;}

/* Modals */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:flex-end;justify-content:center;z-index:100;}
.modal-overlay.open{display:flex;}
.modal-sheet{background:var(--card);border-radius:24px 24px 0 0;padding:24px 20px 40px;width:100%;max-width:430px;max-height:85vh;overflow-y:auto;}
.modal-sheet h3{font-size:18px;margin-bottom:18px;color:var(--text);}
.setting-row{display:flex;flex-direction:column;gap:8px;margin-bottom:18px;}
.setting-row label{font-size:13px;color:var(--sub);font-weight:600;}
.setting-input{padding:12px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:15px;font-family:inherit;outline:none;}
.s-actions{display:flex;gap:8px;}
.s-btn{flex:1;padding:10px;border-radius:999px;border:none;font-size:14px;font-family:inherit;cursor:pointer;}
.s-btn.primary{background:#333;color:#fff;} .s-btn.danger{background:#fee;color:#e55;} .s-btn.cancel-btn{background:var(--bg);color:var(--sub);}

/* Stats */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
.stat-card{background:var(--bg);border-radius:14px;padding:14px;text-align:center;}
.stat-card .s-num{font-size:28px;font-weight:600;} .stat-card .s-label{font-size:12px;color:var(--sub);}
.mood-bar-row{display:flex;flex-direction:column;gap:10px;}
.mood-bar-item{display:flex;align-items:center;gap:10px;}
.mood-bar-item .mb-emoji{font-size:20px;width:28px;}
.mb-track{flex:1;background:var(--bg);border-radius:999px;height:14px;overflow:hidden;}
.mb-fill{height:100%;border-radius:999px;background:#6c5ce7;transition:width .5s;}
.mb-count{font-size:13px;color:var(--sub);width:24px;text-align:right;}

/* Lightbox */
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;z-index:200;}
#lightbox.open{display:flex;}
#lightbox img{max-width:95vw;max-height:90vh;border-radius:12px;}

/* Toast */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:999px;font-size:14px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:300;}
#toast.show{opacity:1;}
</style>
</head>
<body>

<!-- Lock -->
<div id="lock-screen">
  <div class="lk-icon">🔒</div>
  <div class="lk-title">AppDiary</div>
  <input type="password" id="pin-input" maxlength="6" placeholder="••••" inputmode="numeric" onkeydown="if(event.key==='Enter')unlock()">
  <div id="pin-error"></div>
  <button id="unlock-btn" onclick="unlock()">ปลดล็อค</button>
</div>

<div id="loading">กำลังโหลด...</div>

<div id="app" style="display:none">
  <!-- Top row -->
  <div id="top-row">
    <button class="icon-btn" onclick="toggleDark()" id="dark-btn">🌙</button>
    <div id="datetime">
      <div class="dt-date" id="dt-date"></div>
      <div class="dt-time" id="dt-time"></div>
    </div>
    <div style="display:flex;gap:6px;">
      <button class="icon-btn" onclick="openStats()">📊</button>
      <button class="icon-btn" onclick="openSettings()">⚙️</button>
    </div>
  </div>

  <!-- Streak + stats chips -->
  <div id="streak-bar">
    <div class="stat-chip" id="streak-chip">🔥 0 วัน</div>
    <div class="stat-chip" id="total-chip">📝 0 โพส</div>
  </div>

  <!-- Search -->
  <input id="search-bar" type="text" placeholder="ช่องสำหรับค้นหาโพส" oninput="applyFilter()">

  <!-- Mood filter + sort + font -->
  <div id="filter-row">
    <button class="mf-btn active" onclick="filterMood('',this)">ทั้งหมด</button>
    <button class="mf-btn" onclick="filterMood('😊',this)">😊</button>
    <button class="mf-btn" onclick="filterMood('😐',this)">😐</button>
    <button class="mf-btn" onclick="filterMood('😢',this)">😢</button>
    <button class="mf-btn" onclick="filterMood('😡',this)">😡</button>
    <button class="tool-btn" onclick="toggleSort()" id="sort-btn">🔃 ใหม่→เก่า</button>
    <button class="tool-btn" onclick="changeFont(-1)">A−</button>
    <button class="tool-btn" onclick="changeFont(1)">A+</button>
  </div>

  <!-- Tag filter -->
  <div id="tag-filter-row"></div>

  <!-- On this day -->
  <div id="on-this-day" style="display:none"></div>

  <!-- Feed -->
  <div id="feed"></div>

  <!-- Entry box -->
  <div id="entry-box">
    <textarea id="entry-input" placeholder="ช่องใส่ข้อมูลเพิ่มโพส" oninput="onEntryInput()"></textarea>
    <div id="word-count">0 คำ</div>
    <input type="text" id="tags-input" placeholder="แท็ก: #งาน #ครอบครัว #ท่องเที่ยว">
    <div class="entry-toolbar">
      <div id="mood-row">
        <button class="mood-btn" onclick="selectMood('😊')">😊</button>
        <button class="mood-btn" onclick="selectMood('😐')">😐</button>
        <button class="mood-btn" onclick="selectMood('😢')">😢</button>
        <button class="mood-btn" onclick="selectMood('😡')">😡</button>
      </div>
      <button id="img-btn" onclick="document.getElementById('img-input').click()">📷</button>
      <input type="file" id="img-input" accept="image/*" multiple style="display:none" onchange="handleImages(this.files)">
    </div>
    <div id="img-preview"></div>
    <div id="draft-hint"></div>
  </div>

  <button id="save-btn" onclick="savePost()">บันทึกโพส</button>
  <button id="cancel-edit-btn" onclick="cancelEdit()">ยกเลิกการแก้ไข</button>
</div>

<!-- Settings modal -->
<div class="modal-overlay" id="settings-overlay" onclick="if(event.target===this)closeSettings()">
  <div class="modal-sheet">
    <h3>⚙️ ตั้งค่า</h3>
    <div class="setting-row">
      <label>🔒 PIN ล็อค</label>
      <input class="setting-input" type="password" id="pin-setting" inputmode="numeric" maxlength="6" placeholder="ใส่ PIN ใหม่">
      <div class="s-actions">
        <button class="s-btn primary" onclick="savePin()">บันทึก</button>
        <button class="s-btn danger" onclick="removePin()">ลบ PIN</button>
      </div>
    </div>
    <div class="setting-row">
      <label>🖼 imgbb API Key</label>
      <input class="setting-input" type="text" id="imgbb-setting" placeholder="API Key จาก imgbb.com">
      <div class="s-actions"><button class="s-btn primary" onclick="saveImgbb()">บันทึก</button></div>
    </div>
    <button class="s-btn cancel-btn" style="width:100%;margin-top:4px" onclick="closeSettings()">ปิด</button>
  </div>
</div>

<!-- Stats modal -->
<div class="modal-overlay" id="stats-overlay" onclick="if(event.target===this)closeStats()">
  <div class="modal-sheet">
    <h3>📊 สถิติ</h3>
    <div class="stats-grid" id="stats-grid"></div>
    <div style="font-size:14px;font-weight:600;margin-bottom:12px;color:var(--text)">Mood เดือนนี้</div>
    <div class="mood-bar-row" id="mood-bars"></div>
    <button class="s-btn cancel-btn" style="width:100%;margin-top:20px" onclick="closeStats()">ปิด</button>
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox" onclick="closeLightbox()"><img id="lightbox-img" src=""></div>

<!-- Toast -->
<div id="toast"></div>

<script>
const API='https://script.google.com/macros/s/AKfycbxVB-NO3oX8_2tqqfvxMIs08AmN4z5tmx-6ARrDcLiSZNMmXuygl0kraEkCX-tWxm9htw/exec';
const DRAFT_KEY='appdiary_draft';
var allPosts=[],selectedMood='',activeMoodFilter='',activeTagFilter='',editingId=null,pendingImages=[],sortAsc=false;

/* ── helpers ── */
function apiGet(p){return fetch(API+'?'+new URLSearchParams(p)).then(r=>r.json());}
function apiPost(p){return fetch(API,{method:'POST',body:new URLSearchParams(p)}).then(r=>r.json());}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}

/* ── Dark mode ── */
function toggleDark(){
  var dark=document.body.classList.toggle('dark');
  localStorage.setItem('appdiary_dark',dark?'1':'0');
  document.getElementById('dark-btn').textContent=dark?'☀️':'🌙';
}
function applyDark(){
  if(localStorage.getItem('appdiary_dark')==='1'){document.body.classList.add('dark');document.getElementById('dark-btn').textContent='☀️';}
}

/* ── Font size ── */
function changeFont(d){
  var cur=parseInt(localStorage.getItem('appdiary_fs')||'15');
  var nxt=Math.min(22,Math.max(12,cur+d));
  localStorage.setItem('appdiary_fs',String(nxt));
  document.documentElement.style.setProperty('--fs',nxt+'px');
}
function applyFont(){
  var fs=localStorage.getItem('appdiary_fs')||'15';
  document.documentElement.style.setProperty('--fs',fs+'px');
}

/* ── Lock ── */
function checkLock(){
  if(localStorage.getItem('appdiary_pin')){document.getElementById('lock-screen').style.display='flex';}
  else startApp();
}
function unlock(){
  var pin=localStorage.getItem('appdiary_pin');
  var v=document.getElementById('pin-input').value;
  if(v===pin){document.getElementById('lock-screen').style.display='none';startApp();}
  else{document.getElementById('pin-error').textContent='PIN ไม่ถูกต้อง';document.getElementById('pin-input').value='';}
}
function savePin(){var v=document.getElementById('pin-setting').value.trim();if(!v)return;localStorage.setItem('appdiary_pin',v);document.getElementById('pin-setting').value='';toast('บันทึก PIN แล้ว');}
function removePin(){localStorage.removeItem('appdiary_pin');document.getElementById('pin-setting').value='';toast('ลบ PIN แล้ว');}

/* ── imgbb ── */
function saveImgbb(){var k=document.getElementById('imgbb-setting').value.trim();if(!k)return;localStorage.setItem('appdiary_imgbb',k);toast('บันทึก API Key แล้ว');}
async function uploadToImgbb(file){
  var key=localStorage.getItem('appdiary_imgbb');
  if(!key){alert('ตั้งค่า imgbb API Key ใน ⚙️ ก่อนนะครับ');return null;}
  var form=new FormData();form.append('key',key);form.append('image',file);
  var res=await fetch('https://api.imgbb.com/1/upload',{method:'POST',body:form});
  var data=await res.json();return data&&data.data?data.data.url:null;
}
async function handleImages(files){
  var btn=document.getElementById('img-btn');btn.textContent='⏳';btn.disabled=true;
  for(var i=0;i<files.length;i++){
    var url=await uploadToImgbb(files[i]);
    if(url){pendingImages.push(url);var img=document.createElement('img');img.src=url;document.getElementById('img-preview').appendChild(img);}
  }
  btn.textContent='📷';btn.disabled=false;document.getElementById('img-input').value='';
}

/* ── Draft & word count ── */
function onEntryInput(){
  var c=document.getElementById('entry-input').value;
  var words=c.trim()?c.trim().split(/\s+/).length:0;
  document.getElementById('word-count').textContent=words+' คำ';
  if(!editingId){localStorage.setItem(DRAFT_KEY,c);document.getElementById('draft-hint').textContent=c?'บันทึก draft อัตโนมัติ':'';}
}
function loadDraft(){var d=localStorage.getItem(DRAFT_KEY)||'';if(d){document.getElementById('entry-input').value=d;document.getElementById('draft-hint').textContent='กู้คืน draft';onEntryInput();}}
function clearDraft(){localStorage.removeItem(DRAFT_KEY);document.getElementById('draft-hint').textContent='';}

/* ── Mood ── */
function selectMood(m){
  selectedMood=(selectedMood===m)?'':m;
  document.querySelectorAll('.mood-btn').forEach(b=>b.classList.toggle('selected',b.textContent===selectedMood));
}
function filterMood(m,btn){
  activeMoodFilter=m;
  document.querySelectorAll('.mf-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');applyFilter();
}

/* ── Tags ── */
function parseTags(raw){return (raw||'').split(/[\s,]+/).map(t=>t.trim().replace(/^#/,'')).filter(Boolean);}
function buildTagFilter(){
  var all={};
  allPosts.forEach(p=>{parseTags(p.tags).forEach(t=>{all[t]=(all[t]||0)+1;});});
  var row=document.getElementById('tag-filter-row');
  if(!Object.keys(all).length){row.innerHTML='';return;}
  row.innerHTML='<button class="tag-chip'+(activeTagFilter?'':' active')+'" onclick="filterTag(\'\',this)">ทั้งหมด</button>'
    +Object.keys(all).map(t=>'<button class="tag-chip'+(activeTagFilter===t?' active':'')+'" onclick="filterTag(\''+t+'\',this)">#'+t+'</button>').join('');
}
function filterTag(t,btn){
  activeTagFilter=t;
  document.querySelectorAll('.tag-chip').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');applyFilter();
}

/* ── Sort ── */
function toggleSort(){
  sortAsc=!sortAsc;
  document.getElementById('sort-btn').textContent=sortAsc?'🔃 เก่า→ใหม่':'🔃 ใหม่→เก่า';
  applyFilter();
}

/* ── Filter ── */
function applyFilter(){
  var q=document.getElementById('search-bar').value.toLowerCase().trim();
  var posts=[...allPosts];
  if(sortAsc) posts.reverse();
  var filtered=posts.filter(p=>{
    var okMood=!activeMoodFilter||p.mood===activeMoodFilter;
    var okTag=!activeTagFilter||parseTags(p.tags).includes(activeTagFilter);
    var okQ=!q||String(p.content||'').toLowerCase().includes(q);
    return okMood&&okTag&&okQ;
  });
  renderFeed(filtered);
}

/* ── On this day ── */
function showOnThisDay(){
  var now=new Date();var m=now.getMonth(),d=now.getDate(),y=now.getFullYear();
  var hits=allPosts.filter(p=>{
    if(!p.createdAt) return false;
    var dt=new Date(p.createdAt);
    return dt.getMonth()===m&&dt.getDate()===d&&dt.getFullYear()!==y;
  });
  var el=document.getElementById('on-this-day');
  if(!hits.length){el.style.display='none';return;}
  var p=hits[0];
  var yr=new Date(p.createdAt).getFullYear();
  var text=String(p.content||'').slice(0,80)+(p.content.length>80?'…':'');
  el.style.display='block';
  el.innerHTML='<div class="otd-label">📅 วันนี้เมื่อปี '+(yr+543)+(p.mood?' '+p.mood:'')+'</div><div class="otd-content">'+text+'</div>';
}

/* ── Streak ── */
function calcStreak(){
  var dates=new Set(allPosts.map(p=>{
    if(!p.createdAt) return '';
    var d=new Date(p.createdAt);
    return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
  }));
  var streak=0,cur=new Date();
  while(true){
    var key=cur.getFullYear()+'-'+(cur.getMonth()+1)+'-'+cur.getDate();
    if(dates.has(key)){streak++;cur.setDate(cur.getDate()-1);}else break;
  }
  document.getElementById('streak-chip').textContent='🔥 '+streak+' วัน';
  document.getElementById('total-chip').textContent='📝 '+allPosts.length+' โพส';
}

/* ── Feed ── */
function renderFeed(posts){
  var feed=document.getElementById('feed');
  if(!posts||!posts.length){feed.innerHTML='';return;}
  feed.innerHTML=posts.map(p=>{
    var date=p.createdAt?new Date(p.createdAt).toLocaleString('th-TH',{timeZone:'Asia/Bangkok',year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):'';
    var text=String(p.content||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    var tags=parseTags(p.tags).map(t=>'<span class="post-tag">#'+t+'</span>').join('');
    var imgs=(p.imageUrl||'').split(',').map(u=>u.trim()).filter(Boolean);
    var imgHtml=imgs.length?'<div class="post-images">'+imgs.map(u=>'<img src="'+u+'" onclick="openLightbox(\''+u+'\')">').join('')+'</div>':'';
    return '<div class="post-card">'
      +'<div class="post-header"><div class="post-date">'+date+'</div>'+(p.mood?'<div class="post-mood">'+p.mood+'</div>':'')+'</div>'
      +'<div class="post-content">'+text+'</div>'
      +(tags?'<div class="post-tags">'+tags+'</div>':'')
      +imgHtml
      +'<div class="post-actions">'
      +'<button class="share-btn" onclick="sharePost(\''+p.id+'\')">แชร์</button>'
      +'<button class="edit-btn" onclick="startEdit(\''+p.id+'\')">แก้ไข</button>'
      +'<button class="del-btn" onclick="deletePost(\''+p.id+'\')">ลบ</button>'
      +'</div></div>';
  }).join('');
}

/* ── Save ── */
function savePost(){
  var content=document.getElementById('entry-input').value.trim();
  if(!content) return;
  var btn=document.getElementById('save-btn');btn.disabled=true;btn.textContent='กำลังบันทึก...';
  var params={action:editingId?'update':'save',content,mood:selectedMood,imageUrl:pendingImages.join(','),tags:document.getElementById('tags-input').value};
  if(editingId) params.id=editingId;
  apiPost(params).then(()=>{
    document.getElementById('entry-input').value='';
    document.getElementById('tags-input').value='';
    document.getElementById('img-preview').innerHTML='';
    document.getElementById('word-count').textContent='0 คำ';
    pendingImages=[];clearDraft();selectedMood='';
    document.querySelectorAll('.mood-btn').forEach(b=>b.classList.remove('selected'));
    editingId=null;btn.disabled=false;btn.textContent='บันทึกโพส';
    document.getElementById('cancel-edit-btn').style.display='none';
    return apiGet({action:'list'});
  }).then(data=>{
    allPosts=Array.isArray(data)?data:[];
    buildTagFilter();calcStreak();showOnThisDay();applyFilter();
  }).catch(()=>{btn.disabled=false;btn.textContent='บันทึกโพส';});
}

/* ── Edit ── */
function startEdit(id){
  var p=allPosts.find(x=>x.id===id);if(!p) return;
  editingId=id;
  document.getElementById('entry-input').value=p.content;
  document.getElementById('tags-input').value=p.tags||'';
  selectMood(p.mood||'');
  pendingImages=(p.imageUrl||'').split(',').map(u=>u.trim()).filter(Boolean);
  document.getElementById('img-preview').innerHTML=pendingImages.map(u=>'<img src="'+u+'">').join('');
  document.getElementById('save-btn').textContent='อัพเดตโพส';
  document.getElementById('cancel-edit-btn').style.display='block';
  onEntryInput();
  document.getElementById('entry-input').scrollIntoView({behavior:'smooth'});
  document.getElementById('entry-input').focus();
}
function cancelEdit(){
  editingId=null;selectedMood='';pendingImages=[];
  document.getElementById('entry-input').value='';
  document.getElementById('tags-input').value='';
  document.getElementById('img-preview').innerHTML='';
  document.getElementById('save-btn').textContent='บันทึกโพส';
  document.getElementById('cancel-edit-btn').style.display='none';
  document.querySelectorAll('.mood-btn').forEach(b=>b.classList.remove('selected'));
  loadDraft();
}

/* ── Delete ── */
function deletePost(id){
  if(!confirm('ลบโพสนี้?')) return;
  apiGet({action:'delete',id}).then(()=>{allPosts=allPosts.filter(p=>p.id!==id);buildTagFilter();calcStreak();applyFilter();});
}

/* ── Share ── */
function sharePost(id){
  var p=allPosts.find(x=>x.id===id);if(!p) return;
  var text=(p.mood?p.mood+' ':'')+p.content+(p.tags?' | '+p.tags:'');
  if(navigator.share){navigator.share({text});}
  else{navigator.clipboard.writeText(text).then(()=>toast('คัดลอกแล้ว ✓'));}
}

/* ── Export ── */
function exportTxt(){
  var lines=allPosts.map(p=>{
    var d=p.createdAt?new Date(p.createdAt).toLocaleString('th-TH',{timeZone:'Asia/Bangkok'}):'';
    return '['+d+']'+(p.mood?' '+p.mood:'')+'\n'+p.content+(p.tags?'\nแท็ก: '+p.tags:'')+'\n';
  }).join('\n---\n\n');
  var a=document.createElement('a');
  a.href='data:text/plain;charset=utf-8,'+encodeURIComponent(lines);
  a.download='AppDiary_'+new Date().toISOString().slice(0,10)+'.txt';
  a.click();
}

/* ── Stats ── */
function openStats(){
  var grid=document.getElementById('stats-grid');
  var streak=parseInt(document.getElementById('streak-chip').textContent.replace(/\D/g,''))||0;
  var thisMonth=allPosts.filter(p=>p.createdAt&&new Date(p.createdAt).getMonth()===new Date().getMonth()).length;
  grid.innerHTML='<div class="stat-card"><div class="s-num">'+allPosts.length+'</div><div class="s-label">โพสทั้งหมด</div></div>'
    +'<div class="stat-card"><div class="s-num">'+thisMonth+'</div><div class="s-label">เดือนนี้</div></div>'
    +'<div class="stat-card"><div class="s-num">'+streak+'</div><div class="s-label">🔥 Streak วัน</div></div>'
    +'<div class="stat-card"><div class="s-num" style="font-size:20px;cursor:pointer" onclick="exportTxt()">⬇️ .txt</div><div class="s-label">Export</div></div>';
  var moods=['😊','😐','😢','😡'];
  var counts={};moods.forEach(m=>{counts[m]=allPosts.filter(p=>p.mood===m).length;});
  var max=Math.max(...Object.values(counts),1);
  document.getElementById('mood-bars').innerHTML=moods.map(m=>'<div class="mood-bar-item"><div class="mb-emoji">'+m+'</div><div class="mb-track"><div class="mb-fill" style="width:'+Math.round(counts[m]/max*100)+'%"></div></div><div class="mb-count">'+counts[m]+'</div></div>').join('');
  document.getElementById('stats-overlay').classList.add('open');
}
function closeStats(){document.getElementById('stats-overlay').classList.remove('open');}

/* ── Settings ── */
function openSettings(){document.getElementById('imgbb-setting').value=localStorage.getItem('appdiary_imgbb')||'';document.getElementById('settings-overlay').classList.add('open');}
function closeSettings(){document.getElementById('settings-overlay').classList.remove('open');}

/* ── Lightbox ── */
function openLightbox(url){document.getElementById('lightbox-img').src=url;document.getElementById('lightbox').classList.add('open');}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');}

/* ── Clock ── */
function updateClock(){
  var now=new Date();
  document.getElementById('dt-date').textContent=now.toLocaleDateString('th-TH',{timeZone:'Asia/Bangkok',weekday:'long',year:'numeric',month:'long',day:'numeric'});
  document.getElementById('dt-time').textContent=now.toLocaleTimeString('th-TH',{timeZone:'Asia/Bangkok',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
}

/* ── Start ── */
function startApp(){
  loadDraft();
  apiGet({action:'list'}).then(data=>{
    allPosts=Array.isArray(data)?data:[];
    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='flex';
    buildTagFilter();calcStreak();showOnThisDay();applyFilter();
  }).catch(()=>{document.getElementById('loading').textContent='โหลดไม่สำเร็จ';});
}

window.onload=function(){
  applyDark();applyFont();
  updateClock();setInterval(updateClock,1000);
  checkLock();
};
</script>
</body>
</html>
