<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>AppDiary</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
  <style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; font-family: 'Sarabun', sans-serif;
  background: #f0f0f0;
  background-image: radial-gradient(#ccc 1px, transparent 1px);
  background-size: 18px 18px;
  color: #222; -webkit-font-smoothing: antialiased;
}
#loading {
  display: flex; align-items: center; justify-content: center;
  height: 100vh; font-size: 16px; color: #888;
}
#app {
  display: flex; flex-direction: column;
  min-height: 100vh; max-width: 430px; margin: 0 auto;
  padding: 20px 16px 32px; gap: 16px;
}
#datetime { text-align: center; color: #444; line-height: 1.4; }
#datetime .dt-date { font-size: 18px; font-weight: 600; }
#datetime .dt-time { font-size: 28px; font-weight: 600; letter-spacing: 2px; }
#search-bar {
  width: 100%; padding: 14px 20px; border-radius: 999px; border: none;
  background: #555; color: #fff; font-size: 16px; font-family: inherit;
  outline: none; text-align: center;
}
#search-bar::placeholder { color: #ccc; }

/* entry box */
#entry-box {
  background: #1a1a1a; border-radius: 24px;
  padding: 20px; display: flex; flex-direction: column; gap: 14px;
  min-height: 340px;
}
#entry-input {
  flex: 1; background: transparent; border: none;
  color: #fff; font-size: 17px; font-family: inherit;
  line-height: 1.7; resize: none; outline: none;
  min-height: 220px; width: 100%;
}
#entry-input::placeholder { color: #555; }

/* mood selector */
#mood-row { display: flex; gap: 10px; justify-content: center; }
.mood-btn {
  font-size: 26px; background: none; border: 2px solid transparent;
  border-radius: 12px; padding: 4px 10px; cursor: pointer; transition: border-color .15s;
}
.mood-btn.selected { border-color: #fff; background: rgba(255,255,255,.1); }

/* draft indicator */
#draft-hint { font-size: 12px; color: #555; text-align: right; }

/* save / edit mode */
#save-btn {
  width: 100%; padding: 18px; border-radius: 999px; border: none;
  background: #2dca5a; color: #fff; font-size: 18px;
  font-family: inherit; font-weight: 600; cursor: pointer; transition: opacity .2s;
}
#save-btn:active { opacity: .8; }
#save-btn:disabled { background: #aaa; cursor: default; }
#cancel-edit-btn {
  width: 100%; padding: 12px; border-radius: 999px; border: 2px solid #888;
  background: transparent; color: #555; font-size: 15px;
  font-family: inherit; cursor: pointer; display: none;
}

/* feed */
#feed { display: flex; flex-direction: column; gap: 12px; }
.post-card {
  background: #fff; border-radius: 16px; padding: 16px;
  box-shadow: 0 1px 4px rgba(0,0,0,.08);
}
.post-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.post-date { font-size: 12px; color: #aaa; }
.post-mood { font-size: 20px; }
.post-content { font-size: 15px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
.post-actions { margin-top: 10px; display: flex; justify-content: flex-end; gap: 8px; }
.edit-btn { background: none; border: none; color: #4a90d9; font-size: 13px; cursor: pointer; padding: 4px 8px; }
.del-btn  { background: none; border: none; color: #e55; font-size: 13px; cursor: pointer; padding: 4px 8px; }
  </style>
</head>
<body>
  <div id="loading">กำลังโหลด...</div>
  <div id="app" style="display:none">
    <div id="datetime">
      <div class="dt-date" id="dt-date"></div>
      <div class="dt-time" id="dt-time"></div>
    </div>

    <input id="search-bar" type="text" placeholder="ช่องสำหรับค้นหาโพส" oninput="onSearch(this.value)">
    <div id="feed"></div>

    <div id="entry-box">
      <textarea id="entry-input" placeholder="ช่องใส่ข้อมูลเพิ่มโพส" oninput="onDraftInput()"></textarea>
      <div id="mood-row">
        <button class="mood-btn" onclick="selectMood('😊')">😊</button>
        <button class="mood-btn" onclick="selectMood('😐')">😐</button>
        <button class="mood-btn" onclick="selectMood('😢')">😢</button>
        <button class="mood-btn" onclick="selectMood('😡')">😡</button>
      </div>
      <div id="draft-hint"></div>
    </div>

    <button id="save-btn" onclick="savePost()">บันทึกโพส</button>
    <button id="cancel-edit-btn" onclick="cancelEdit()">ยกเลิกการแก้ไข</button>
  </div>

  <script>
const API = 'https://script.google.com/macros/s/AKfycbxVB-NO3oX8_2tqqfvxMIs08AmN4z5tmx-6ARrDcLiSZNMmXuygl0kraEkCX-tWxm9htw/exec';
const DRAFT_KEY = 'appdiary_draft';
var allPosts = [];
var selectedMood = '';
var editingId = null;

function apiGet(params) {
  return fetch(API + '?' + new URLSearchParams(params)).then(function(r) { return r.json(); });
}
function apiPost(params) {
  return fetch(API, { method: 'POST', body: new URLSearchParams(params) }).then(function(r) { return r.json(); });
}

/* ── init ── */
function init() {
  loadDraft();
  apiGet({ action: 'list' }).then(function(data) {
    allPosts = Array.isArray(data) ? data : [];
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    renderFeed(allPosts);
  }).catch(function() {
    document.getElementById('loading').textContent = 'โหลดไม่สำเร็จ';
  });
}

/* ── draft ── */
function onDraftInput() {
  if (editingId) return;
  var content = document.getElementById('entry-input').value;
  localStorage.setItem(DRAFT_KEY, content);
  document.getElementById('draft-hint').textContent = content ? 'บันทึก draft อัตโนมัติ' : '';
}
function loadDraft() {
  var draft = localStorage.getItem(DRAFT_KEY) || '';
  if (draft) {
    document.getElementById('entry-input').value = draft;
    document.getElementById('draft-hint').textContent = 'กู้คืน draft';
  }
}
function clearDraft() {
  localStorage.removeItem(DRAFT_KEY);
  document.getElementById('draft-hint').textContent = '';
}

/* ── mood ── */
function selectMood(m) {
  selectedMood = (selectedMood === m) ? '' : m;
  document.querySelectorAll('.mood-btn').forEach(function(btn) {
    btn.classList.toggle('selected', btn.textContent === selectedMood);
  });
}

/* ── feed ── */
function renderFeed(posts) {
  var feed = document.getElementById('feed');
  if (!posts || posts.length === 0) { feed.innerHTML = ''; return; }
  feed.innerHTML = posts.map(function(p) {
    var date = p.createdAt ? new Date(p.createdAt).toLocaleString('th-TH', {
      timeZone: 'Asia/Bangkok', year: 'numeric', month: 'short',
      day: 'numeric', hour: '2-digit', minute: '2-digit'
    }) : '';
    var text = String(p.content || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    var mood = p.mood || '';
    return '<div class="post-card">'
      + '<div class="post-header">'
      + '<div class="post-date">' + date + '</div>'
      + (mood ? '<div class="post-mood">' + mood + '</div>' : '')
      + '</div>'
      + '<div class="post-content">' + text + '</div>'
      + '<div class="post-actions">'
      + '<button class="edit-btn" onclick="startEdit(\'' + p.id + '\')">แก้ไข</button>'
      + '<button class="del-btn" onclick="deletePost(\'' + p.id + '\')">ลบ</button>'
      + '</div></div>';
  }).join('');
}

/* ── save / update ── */
function savePost() {
  var input = document.getElementById('entry-input');
  var content = input.value.trim();
  if (!content) return;
  var btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = 'กำลังบันทึก...';

  var params = editingId
    ? { action: 'update', id: editingId, content: content, mood: selectedMood }
    : { action: 'save', content: content, mood: selectedMood };

  apiPost(params).then(function() {
    input.value = ''; clearDraft(); selectedMood = '';
    document.querySelectorAll('.mood-btn').forEach(function(b) { b.classList.remove('selected'); });
    editingId = null;
    btn.disabled = false; btn.textContent = 'บันทึกโพส';
    document.getElementById('cancel-edit-btn').style.display = 'none';
    return apiGet({ action: 'list' });
  }).then(function(data) {
    allPosts = Array.isArray(data) ? data : [];
    renderFeed(allPosts);
  }).catch(function() {
    btn.disabled = false; btn.textContent = 'บันทึกโพส';
  });
}

/* ── edit ── */
function startEdit(id) {
  var post = allPosts.find(function(p) { return p.id === id; });
  if (!post) return;
  editingId = id;
  document.getElementById('entry-input').value = post.content;
  selectMood(post.mood || '');
  document.getElementById('save-btn').textContent = 'อัพเดตโพส';
  document.getElementById('cancel-edit-btn').style.display = 'block';
  document.getElementById('entry-input').scrollIntoView({ behavior: 'smooth' });
  document.getElementById('entry-input').focus();
}
function cancelEdit() {
  editingId = null; selectedMood = '';
  document.getElementById('entry-input').value = '';
  document.getElementById('save-btn').textContent = 'บันทึกโพส';
  document.getElementById('cancel-edit-btn').style.display = 'none';
  document.querySelectorAll('.mood-btn').forEach(function(b) { b.classList.remove('selected'); });
  loadDraft();
}

/* ── delete ── */
function deletePost(id) {
  if (!confirm('ลบโพสนี้?')) return;
  apiGet({ action: 'delete', id: id }).then(function() {
    allPosts = allPosts.filter(function(p) { return p.id !== id; });
    renderFeed(allPosts);
  });
}

/* ── search ── */
function onSearch(q) {
  var query = q.toLowerCase().trim();
  if (!query) { renderFeed(allPosts); return; }
  renderFeed(allPosts.filter(function(p) {
    return String(p.content || '').toLowerCase().indexOf(query) !== -1;
  }));
}

/* ── clock ── */
function updateClock() {
  var now = new Date();
  document.getElementById('dt-date').textContent = now.toLocaleDateString('th-TH', {
    timeZone: 'Asia/Bangkok', weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });
  document.getElementById('dt-time').textContent = now.toLocaleTimeString('th-TH', {
    timeZone: 'Asia/Bangkok', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
  });
}

window.onload = function() {
  updateClock(); setInterval(updateClock, 1000); init();
};
  </script>
</body>
</html>
