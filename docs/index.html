<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>AppDiary</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
  <style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  font-family: 'Sarabun', sans-serif;
  background: #f0f0f0;
  background-image: radial-gradient(#ccc 1px, transparent 1px);
  background-size: 18px 18px;
  color: #222;
  -webkit-font-smoothing: antialiased;
}
#loading {
  display: flex; align-items: center; justify-content: center;
  height: 100vh; font-size: 16px; color: #888;
}
#app {
  display: flex; flex-direction: column;
  min-height: 100vh;
  max-width: 430px; margin: 0 auto;
  padding: 20px 16px 32px; gap: 16px;
}
#datetime { text-align: center; color: #444; line-height: 1.4; }
#datetime .dt-date { font-size: 18px; font-weight: 600; }
#datetime .dt-time { font-size: 28px; font-weight: 600; letter-spacing: 2px; }
#search-bar {
  width: 100%; padding: 14px 20px;
  border-radius: 999px; border: none;
  background: #555; color: #fff;
  font-size: 16px; font-family: inherit;
  outline: none; text-align: center;
}
#search-bar::placeholder { color: #ccc; }
#entry-box {
  background: #1a1a1a; border-radius: 24px;
  padding: 20px; display: flex; flex-direction: column;
  min-height: 340px;
}
#entry-input {
  flex: 1; background: transparent; border: none;
  color: #fff; font-size: 17px; font-family: inherit;
  line-height: 1.7; resize: none; outline: none;
  min-height: 300px; width: 100%;
}
#entry-input::placeholder { color: #555; }
#save-btn {
  width: 100%; padding: 18px; border-radius: 999px;
  border: none; background: #2dca5a; color: #fff;
  font-size: 18px; font-family: inherit; font-weight: 600;
  cursor: pointer; transition: opacity .2s;
}
#save-btn:active { opacity: .8; }
#save-btn:disabled { background: #aaa; cursor: default; }
#feed { display: flex; flex-direction: column; gap: 12px; }
.post-card {
  background: #fff; border-radius: 16px; padding: 16px;
  box-shadow: 0 1px 4px rgba(0,0,0,.08);
}
.post-date { font-size: 12px; color: #aaa; margin-bottom: 6px; }
.post-content { font-size: 15px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
.post-actions { margin-top: 10px; text-align: right; }
.del-btn { background: none; border: none; color: #e55; font-size: 13px; cursor: pointer; padding: 4px 8px; }
  </style>
</head>
<body>
  <div id="loading">กำลังโหลด...</div>
  <div id="app" style="display:none">
    <div id="datetime">
      <div class="dt-date" id="dt-date"></div>
      <div class="dt-time" id="dt-time"></div>
    </div>
    <input id="search-bar" type="text" placeholder="ช่องสำหรับค้นหาโพส" oninput="onSearch(this.value)">
    <div id="feed"></div>
    <div id="entry-box">
      <textarea id="entry-input" placeholder="ช่องใส่ข้อมูลเพิ่มโพส"></textarea>
    </div>
    <button id="save-btn" onclick="savePost()">บันทึกโพส</button>
  </div>
  <script>
const API = 'https://script.google.com/macros/s/AKfycbxVB-NO3oX8_2tqqfvxMIs08AmN4z5tmx-6ARrDcLiSZNMmXuygl0kraEkCX-tWxm9htw/exec';
var allPosts = [];

function apiGet(params) {
  return fetch(API + '?' + new URLSearchParams(params)).then(function(r) { return r.json(); });
}
function apiPost(params) {
  return fetch(API, { method: 'POST', body: new URLSearchParams(params) }).then(function(r) { return r.json(); });
}

function init() {
  apiGet({ action: 'list' }).then(function(data) {
    allPosts = Array.isArray(data) ? data : [];
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    renderFeed(allPosts);
  }).catch(function() {
    document.getElementById('loading').textContent = 'โหลดไม่สำเร็จ';
  });
}

function renderFeed(posts) {
  var feed = document.getElementById('feed');
  if (!posts || posts.length === 0) { feed.innerHTML = ''; return; }
  feed.innerHTML = posts.map(function(p) {
    var date = p.createdAt ? new Date(p.createdAt).toLocaleString('th-TH', {
      timeZone: 'Asia/Bangkok', year: 'numeric', month: 'short',
      day: 'numeric', hour: '2-digit', minute: '2-digit'
    }) : '';
    var text = String(p.content || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return '<div class="post-card">'
      + '<div class="post-date">' + date + '</div>'
      + '<div class="post-content">' + text + '</div>'
      + '<div class="post-actions"><button class="del-btn" onclick="deletePost(\'' + p.id + '\')">ลบ</button></div>'
      + '</div>';
  }).join('');
}

function savePost() {
  var input = document.getElementById('entry-input');
  var content = input.value.trim();
  if (!content) return;
  var btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = 'กำลังบันทึก...';
  apiPost({ action: 'save', content: content }).then(function() {
    input.value = '';
    btn.disabled = false; btn.textContent = 'บันทึกโพส';
    return apiGet({ action: 'list' });
  }).then(function(data) {
    allPosts = Array.isArray(data) ? data : [];
    renderFeed(allPosts);
  }).catch(function() {
    btn.disabled = false; btn.textContent = 'บันทึกโพส';
  });
}

function deletePost(id) {
  if (!confirm('ลบโพสนี้?')) return;
  apiGet({ action: 'delete', id: id }).then(function() {
    allPosts = allPosts.filter(function(p) { return p.id !== id; });
    renderFeed(allPosts);
  });
}

function onSearch(q) {
  var query = q.toLowerCase().trim();
  if (!query) { renderFeed(allPosts); return; }
  renderFeed(allPosts.filter(function(p) {
    return String(p.content || '').toLowerCase().indexOf(query) !== -1;
  }));
}

function updateClock() {
  var now = new Date();
  document.getElementById('dt-date').textContent = now.toLocaleDateString('th-TH', {
    timeZone: 'Asia/Bangkok', weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });
  document.getElementById('dt-time').textContent = now.toLocaleTimeString('th-TH', {
    timeZone: 'Asia/Bangkok', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
  });
}

window.onload = function() {
  updateClock();
  setInterval(updateClock, 1000);
  init();
};
  </script>
</body>
</html>
